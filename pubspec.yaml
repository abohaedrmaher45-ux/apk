name: market_ledger
description: "برنامج أبو ماهر للحسابات - قسم الفرشات والمساند"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.19.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.5.3
  device_info_plus: ^10.1.2
  http: ^1.2.2
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  
  # Date handling
  intl: ^0.19.0
  
  # Local storage
  path_provider: ^2.1.5
  
  # PDF & Sharing
  pdf: ^3.11.1
  share_plus: ^10.1.2
  
  # ZIP & File
  archive: ^3.4.10
  file_picker: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  # إضافة الخط العربي Cairo لاستخدامه في ملفات PDF
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700