  crypto: 3.0.6                 # التشفير وإنشاء البصمات
         
           
  flutter_secure_storage: 9.0.0      # ← أضف هذا
  path_provider: 2.1.1              # ← أضف هذا
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
