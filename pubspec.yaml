version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # مكتبات الأمان والحماية
  shared_preferences: 2.5.3     # تخزين بيانات الترخيص
