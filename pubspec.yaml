name: construction_ledger
description: نظام إدارة مواد البناء - سحب وإرجاع - العجاج

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.5.3
  intl: ^0.19.0
  pdf: ^3.10.7
  printing: ^5.12.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  fluttertoast: ^8.2.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3   # لإضافة أيقونة التطبيق

flutter:
  uses-material-design: true

  # إذا كان لديك أي أصول أخرى (صور، خطوط) ضعها هنا
  # assets:
  #   - assets/images/

# ============================================================
# إعدادات أيقونة التطبيق (Launcher Icon)
# ============================================================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/launcher_icon.png"        # الصورة الأصلية (يجب وضعها في هذا المسار)
  adaptive_icon_background: "#FFFFFF"                # خلفية بيضاء للأيقونات التكيفية (Android 8+)
  adaptive_icon_foreground: "assets/icon/launcher_icon.png"
  min_sdk_android: 21