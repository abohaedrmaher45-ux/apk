name: construction_ledger
description: تطبيق إدارة مواد البناء - شركة العجاج للمقاولات
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # الأدوات الأساسية
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  fluttertoast: ^8.2.5
  
  # ملفات PDF والمشاركة
  pdf: ^3.10.7
  share_plus: ^10.0.0
  path_provider: ^2.1.3
  
  # التحسينات الجديدة
  fl_chart: ^0.68.0
  flutter_local_notifications: ^17.1.0
  timezone: ^0.9.3
  file_picker: ^8.0.6          # ✅ تم رفع الإصدار
  flutter_staggered_animations: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#1E3A5F"
  adaptive_icon_foreground: "assets/icon/foreground.png"
  min_sdk_android: 21