name: construction_ledger
description: تطبيق إدارة مواد البناء - شركة العجاج للمقاولات
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # الأدوات الأساسية
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  fluttertoast: ^8.2.4
  
  # ملفات PDF والمشاركة
  pdf: ^3.10.7
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  
  # التحسينات الجديدة
  fl_chart: ^0.66.0
  flutter_local_notifications: ^16.3.0
  timezone: ^0.9.2
  file_picker: ^6.1.1
  flutter_staggered_animations: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  # تم تعطيل الخطوط مؤقتاً لحين إضافتها
  # إذا أردت إضافة الخطوط لاحقاً، قم بإنشاء مجلد assets/fonts وضع فيه الخطوط
  # ثم قم بإلغاء التعليق عن الأسطر التالية:
  # fonts:
  #   - family: Cairo
  #     fonts:
  #       - asset: assets/fonts/Cairo-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Cairo-Bold.ttf
  #         weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#1E3A5F"
  adaptive_icon_foreground: "assets/icon/foreground.png"
  min_sdk_android: 21